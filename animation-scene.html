<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <a-sky color="white"></a-sky>
            <a-box color="purple" position="0 0 -4"
            animate="
            property: color;
            from: purple;
            to: pink;
            loop: true;
            dur: 2000;
            "
            animate="
            property: position;
            from: 0 0 -4;
            to: 4 0 -4;
            dur: 2000;
            loop: true;
            dir: alternate;
            "
            animation="
                property: rotation;
                from: 0 0 90;
                to: 0 180 90;
                loop: true;
                dir: alternate;
                "
            ></a-box>
        </a-scene>
    </body>
</html>
